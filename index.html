<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Финансовый помощник</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --primary-color: #40a7e3;
      --income-color: #34C759;
      --expense-color: #FF3B30;
      --bg-color: #F2F2F7;
      --card-bg: rgba(255, 255, 255, 0.85);
      --text-color: #000000;
      --header-text: #1C1C1E;
      --secondary-text: #8E8E93;
      --border-radius: 16px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      --blur: blur(15px);
    }
    .dark-theme {
      --primary-color: #64b5f6;
      --income-color: #30D158;
      --expense-color: #FF453A;
      --bg-color: #000000;
      --card-bg: rgba(30, 30, 30, 0.85);
      --text-color: #FFFFFF;
      --header-text: #FFFFFF;
      --secondary-text: #8E8E93;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: system-ui, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      padding: 16px;
      transition: background-color 0.3s, color 0.3s, background-image 0.5s ease;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
    }
    header, .balance-card, .transactions, .add-transaction {
      background: var(--card-bg);
      backdrop-filter: var(--blur);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px;
      margin-bottom: 20px;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; color: var(--header-text); }
    .balance-amount { font-size: 36px; font-weight: 800; margin: 16px 0; }
    .income-expense { display: flex; gap: 12px; }
    .income, .expense { flex: 1; padding: 14px; border-radius: 14px; }
    .income { background: rgba(52,199,89,0.2); color: var(--income-color); }
    .expense { background: rgba(255,59,48,0.2); color: var(--expense-color); }
    .transaction-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px; margin: 6px 0; border-radius: 12px;
      background: rgba(255,255,255,0.6); backdrop-filter: blur(10px);
    }
    .dark-theme .transaction-item { background: rgba(255,255,255,0.15); }
    .transaction-details { flex: 1; margin-left: 12px; }
    .transaction-amount.income { color: var(--income-color); }
    .transaction-amount.expense { color: var(--expense-color); }
    .actions button { border: none; background: none; cursor: pointer; font-size: 18px; margin-left: 8px; }
    label { font-weight: 600; margin-bottom: 6px; display: block; }
    input, select {
      width: 100%; padding: 12px; border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.1); margin-bottom: 12px;
    }
    button {
      padding: 12px; border: none; border-radius: 10px;
      font-weight: 700; cursor: pointer; flex: 1;
    }
    .btn-income { background: var(--income-color); color: white; }
    .btn-expense { background: var(--expense-color); color: white; }
    .btn-group { display: flex; gap: 10px; }
    .theme-toggle, .theme-selector {
      position: fixed; right: 20px; width: 50px; height: 50px;
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 22px; cursor: pointer; z-index: 1000;
    }
    .theme-toggle { bottom: 20px; background: #333; color: white; }
    .theme-selector { bottom: 80px; background: #333; color: white; }
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
      border-radius: 8px; opacity: 0; transition: opacity 0.3s, bottom 0.3s;
      z-index: 2000;
    }
    .toast.show { opacity: 1; bottom: 40px; }
  </style>
</head>
<body>
  <header>
    <h1>Финансовый помощник</h1>
    <p>Учет доходов и расходов</p>
  </header>
  <div class="balance-card">
    <h2>Баланс</h2>
    <div class="balance-amount" id="balance">0 ₽</div>
    <div class="income-expense">
      <div class="income"><h3>Доходы</h3><div id="income-total">0 ₽</div></div>
      <div class="expense"><h3>Расходы</h3><div id="expense-total">0 ₽</div></div>
    </div>
  </div>
  <div class="transactions">
    <h2>Операции</h2>
    <div id="transaction-list"><div class="empty">Нет операций</div></div>
  </div>
  <div class="add-transaction">
    <h2>Добавить операцию</h2>
    <label>Описание</label>
    <input type="text" id="description">
    <label>Сумма (₽)</label>
    <input type="number" id="amount">
    <label>Категория</label>
    <select id="category">
      <option value="">Выберите</option>
      <optgroup label="Доходы">
        <option value="salary">Зарплата</option>
        <option value="freelance">Фриланс</option>
        <option value="other-income">Другое</option>
      </optgroup>
      <optgroup label="Расходы">
        <option value="products">Продукты</option>
        <option value="transport">Транспорт</option>
        <option value="other-expense">Другое</option>
      </optgroup>
    </select>
    <div class="btn-group">
      <button class="btn-income" onclick="app.addTransaction('income')">Доход</button>
      <button class="btn-expense" onclick="app.addTransaction('expense')">Расход</button>
    </div>
  </div>
  <div class="theme-toggle" onclick="app.toggleTheme()">🌙</div>
  <div class="theme-selector" onclick="app.changeBackground()">🖼</div>
  <div id="toast" class="toast"></div>
<script>
class TransactionManager {
  constructor() {
    this.transactions = [];
    this.isDark = false;
    this.bg = '';
    this.tg = window.Telegram.WebApp;
    this.tg.expand();
    this.load();
  }
  format(n) {
    return new Intl.NumberFormat('ru-RU').format(n);
  }
  showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2000);
  }
  save() {
    localStorage.setItem('transactions', JSON.stringify(this.transactions));
    localStorage.setItem('isDark', this.isDark);
    localStorage.setItem('bg', this.bg);
  }
  load() {
    this.transactions = JSON.parse(localStorage.getItem('transactions')) || [];
    this.isDark = localStorage.getItem('isDark')==='true';
    this.bg = localStorage.getItem('bg') || 'https://i.pinimg.com/1200x/09/42/81/0942812567b8bd8717e0c458290d54f8.jpg';
    this.applyTheme();
    this.render();
  }
  addTransaction(type) {
    const desc = document.getElementById('description').value.trim();
    const amt = parseFloat(document.getElementById('amount').value);
    const cat = document.getElementById('category').value;
    if(!desc || !amt || amt<=0 || !cat) return this.showToast('Заполните поля');
    const t = {id:Date.now(),type,description:desc,amount:amt,category:cat,date:new Date().toISOString()};
    this.transactions.push(t);
    this.save();
    this.render();
    document.getElementById('description').value='';
    document.getElementById('amount').value='';
    document.getElementById('category').value='';
    this.showToast((type==='income'?'Доход':'Расход')+' добавлен');
  }
  deleteTransaction(id) {
    this.transactions = this.transactions.filter(t=>t.id!==id);
    this.save(); this.render(); this.showToast('Удалено');
  }
  editTransaction(id) {
    const t = this.transactions.find(x=>x.id===id);
    if(!t) return;
    document.getElementById('description').value=t.description;
    document.getElementById('amount').value=t.amount;
    document.getElementById('category').value=t.category;
    this.transactions = this.transactions.filter(x=>x.id!==id);
    this.save(); this.render();
    this.showToast('Редактируйте и сохраните снова');
  }
  render() {
    const bal=document.getElementById('balance');
    const inc=document.getElementById('income-total');
    const exp=document.getElementById('expense-total');
    const list=document.getElementById('transaction-list');
    if(this.transactions.length===0){list.innerHTML='<div class="empty">Нет операций</div>';return;}
    let total=0,income=0,expense=0;
    list.innerHTML='';
    this.transactions.slice().reverse().forEach(t=>{
      if(t.type==='income') income+=t.amount; else expense+=t.amount;
      total+=(t.type==='income'?t.amount:-t.amount);
      const item=document.createElement('div');
      item.className='transaction-item';
      const date=new Date(t.date).toLocaleDateString('ru-RU');
      item.innerHTML=`
        <div>💰</div>
        <div class="transaction-details">
          <div>${t.description}</div>
          <div class="transaction-category">${date}</div>
        </div>
        <div class="transaction-amount ${t.type}">${t.type==='income'?'+':'-'} ${this.format(t.amount)} ₽</div>
        <div class="actions">
          <button onclick="app.editTransaction(${t.id})">✏️</button>
          <button onclick="app.deleteTransaction(${t.id})">🗑</button>
        </div>`;
      list.appendChild(item);
    });
    bal.textContent=this.format(total)+' ₽';
    inc.textContent=this.format(income)+' ₽';
    exp.textContent=this.format(expense)+' ₽';
  }
  toggleTheme(){
    this.isDark=!this.isDark;
    this.applyTheme(); this.save();
  }
  applyTheme(){
    if(this.isDark){document.body.classList.add('dark-theme');document.querySelector('.theme-toggle').textContent='☀️';}
    else {document.body.classList.remove('dark-theme');document.querySelector('.theme-toggle').textContent='🌙';}
    document.body.style.backgroundImage=`url('${this.bg}')`;
  }
  changeBackground(){
    const urls=[
      'https://i.pinimg.com/736x/76/f2/e1/76f2e1b76920a1540982ee3b67cd22a8.jpg',
      'https://i.pinimg.com/736x/13/8b/08/138b0800ed24891e646211cbaad2a757.jpg',
      'https://i.pinimg.com/1200x/09/42/81/0942812567b8bd8717e0c458290d54f8.jpg'
    ];
    const next=urls[(urls.indexOf(this.bg)+1)%urls.length];
    this.bg=next; this.applyTheme(); this.save();
    this.showToast('Фон изменен');
  }
}
const app=new TransactionManager();
</script>
</body>
</html>
