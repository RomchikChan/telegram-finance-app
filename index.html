<script>
class FinanceApp {
  constructor() {
    this.tg = window.Telegram.WebApp;
    this.data = { transactions: [], isDark: false, bg: 'https://i.pinimg.com/1200x/09/42/81/0942812567b8bd8717e0c458290d54f8.jpg' };
    this.period = 'all';
    this.chart = null;

    this.checkAccess();
  }

  checkAccess() {
    const user = this.tg.initDataUnsafe?.user;
    const MY_REAL_ID = 953937928; // Твой подтвержденный ID

    // 1. Проверка через Telegram
    if (user) {
      if (Number(user.id) === MY_REAL_ID) {
        this.unlock();
        return;
      } else {
        // Если ID не совпал, выводим его на экран для диагностики
        document.getElementById('lock-screen').innerHTML = `
          <div style="font-size: 50px;">❌</div>
          <h1>Доступ запрещен</h1>
          <p style="margin-top:10px; opacity:0.8;">Ваш Telegram ID: <b>${user.id}</b></p>
          <p style="font-size:12px; opacity:0.5;">Скопируйте этот номер, если он отличается от прописанного в коде.</p>
        `;
        return;
      }
    }

    // 2. Проверка для PWA (Android иконка)
    if (localStorage.getItem('is_authenticated') === 'true') {
        this.unlock();
    } else {
        document.getElementById('lock-screen').innerHTML = `
          <div style="font-size: 50px;">🔒</div>
          <h1>Ошибка входа</h1>
          <p style="margin-top:10px; opacity:0.6;">Пожалуйста, запустите приложение<br>через Telegram бота хотя бы один раз.</p>
        `;
    }
  }

  unlock() {
    localStorage.setItem('is_authenticated', 'true');
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'flex';
    document.getElementById('ui-buttons').style.display = 'flex';
    this.init();
  }

  init() {
    this.tg.expand();
    this.tg.ready();
    this.sync();
    window.addEventListener('focus', () => this.sync());
  }

  async sync() {
    this.tg.CloudStorage.getItem('finance_data', (err, val) => {
      if (!err && val) {
        this.data = JSON.parse(val);
        this.applyTheme();
        this.render();
      } else {
        const local = localStorage.getItem('finance_data');
        if (local) {
          this.data = JSON.parse(local);
          this.applyTheme();
          this.render();
        }
      }
    });
  }

  async save() {
    const json = JSON.stringify(this.data);
    this.tg.CloudStorage.setItem('finance_data', json);
    localStorage.setItem('finance_data', json);
    this.render();
  }

  showToast(txt) {
    const el = document.getElementById('toast');
    el.textContent = txt; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  setPeriod(p) {
    this.period = p;
    document.querySelectorAll('.period-btn').forEach(b => {
      b.classList.toggle('active', b.getAttribute('onclick').includes(`'${p}'`));
    });
    this.render();
  }

  add(type) {
    const d = document.getElementById('desc').value.trim();
    const a = parseFloat(document.getElementById('amt').value);
    const c = document.getElementById('cat').value;
    if (!d || isNaN(a) || a <= 0 || !c) return this.showToast('Ошибка данных');
    this.data.transactions.push({ id: Date.now(), type, desc: d, amt: a, cat: c, date: new Date().toISOString() });
    this.save();
    document.getElementById('desc').value = ''; document.getElementById('amt').value = '';
    this.showToast('Записано');
  }

  delete(id) {
    if(confirm('Удалить?')) {
      this.data.transactions = this.data.transactions.filter(t => t.id !== id);
      this.save();
    }
  }

  render() {
    const filtered = this.data.transactions.filter(t => {
      if (this.period === 'all') return true;
      const td = new Date(t.date);
      const diff = (new Date() - td) / 86400000;
      return this.period === 'week' ? diff <= 7 : diff <= 30;
    });

    let bal = 0, inc = 0, exp = 0;
    const cats = {};
    const listEl = document.getElementById('list');
    listEl.innerHTML = '';

    filtered.sort((a,b) => b.id - a.id).forEach(t => {
      if (t.type === 'income') { inc += t.amt; bal += t.amt; }
      else { exp += t.amt; bal -= t.amt; cats[t.cat] = (cats[t.cat] || 0) + t.amt; }
      const item = document.createElement('div');
      item.className = 'transaction-item';
      item.innerHTML = `<div class="t-info"><span class="t-name">${t.desc}</span><span class="t-date">${new Date(t.date).toLocaleDateString()}</span></div><div style="color:var(--${t.type}-color)">${t.amt} ₽</div><button onclick="app.delete(${t.id})" style="border:none;background:none;padding-left:10px;">🗑</button>`;
      listEl.appendChild(item);
    });

    document.getElementById('balance').textContent = bal.toLocaleString() + ' ₽';
    document.getElementById('inc-total').textContent = inc.toLocaleString() + ' ₽';
    document.getElementById('exp-total').textContent = exp.toLocaleString() + ' ₽';
    this.updateChart(cats);
  }

  updateChart(cats) {
    const keys = Object.keys(cats);
    const card = document.getElementById('chart-card');
    if (!keys.length) { card.style.display='none'; return; }
    card.style.display='block';
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (this.chart) this.chart.destroy();
    this.chart = new Chart(ctx, {
      type: 'doughnut',
      data: { labels: keys.map(k=>this.getCatName(k)), datasets: [{ data: Object.values(cats), backgroundColor: ['#FF3B30', '#FFCC00', '#007AFF', '#34C759'], borderWidth: 0 }] },
      options: { cutout: '75%', plugins: { legend: { position: 'bottom', labels: { color: this.data.isDark?'#fff':'#000' } } }, maintainAspectRatio: false }
    });
  }

  getCatName(c) {
    const m = { salary:'Зарплата', food:'Продукты', taxi:'Транспорт', cafe:'Кафе' };
    return m[c] || 'Прочее';
  }

  toggleTheme() { this.data.isDark = !this.data.isDark; this.applyTheme(); this.save(); }
  applyTheme() {
    document.body.classList.toggle('dark-theme', this.data.isDark);
    document.body.style.backgroundImage = `url('${this.data.bg}')`;
    if (this.chart) this.render();
  }
  changeBg() {
    const b = ['https://i.pinimg.com/1200x/09/42/81/0942812567b8bd8717e0c458290d54f8.jpg', 'https://i.pinimg.com/736x/76/f2/e1/76f2e1b76920a1540982ee3b67cd22a8.jpg'];
    this.data.bg = b[(b.indexOf(this.data.bg) + 1) % b.length];
    this.applyTheme(); this.save();
  }
}
const app = new FinanceApp();
</script>
