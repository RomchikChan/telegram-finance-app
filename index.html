<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smart Finance</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary-color: #40a7e3;
      --income-color: #34C759;
      --expense-color: #FF3B30;
      --bg-color: #F2F2F7;
      --card-bg: rgba(255, 255, 255, 0.85);
      --text-color: #1c1c1e;
      --border-radius: 20px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }
    .dark-theme {
      --bg-color: #000000;
      --card-bg: rgba(28, 28, 30, 0.9);
      --text-color: #FFFFFF;
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      justify-content: center;
    }
    /* Контейнер теперь виден сразу */
    .app-container { width: 100%; max-width: 500px; padding: 16px; display: flex; flex-direction: column; }
    
    header, .balance-card, .analytics-card, .add-transaction, .transactions {
      background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: var(--border-radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); border: 1px solid rgba(255, 255, 255, 0.1);
    }
    h1 { font-size: 22px; margin-bottom: 15px; font-weight: 800; }
    h2 { font-size: 14px; opacity: 0.6; margin-bottom: 12px; text-transform: uppercase; }
    .period-selector { display: flex; gap: 8px; margin-bottom: 5px; }
    .period-btn { flex: 1; padding: 10px; border: none; border-radius: 12px; background: rgba(0,0,0,0.05); color: var(--text-color); font-size: 13px; cursor: pointer; }
    .period-btn.active { background: var(--primary-color); color: white; }
    .balance-amount { font-size: 36px; font-weight: 800; margin-bottom: 15px; letter-spacing: -1px; }
    .inc-exp-row { display: flex; gap: 10px; }
    .stat-box { flex: 1; padding: 12px; border-radius: 14px; font-size: 13px; }
    .stat-inc { background: rgba(52,199,89,0.12); color: var(--income-color); }
    .stat-exp { background: rgba(255,59,48,0.12); color: var(--expense-color); }
    .chart-container { height: 220px; position: relative; margin: 10px 0; }
    input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.08); margin-bottom: 10px; background: rgba(255,255,255,0.7); color: inherit; font-size: 16px; }
    .btn-group { display: flex; gap: 10px; }
    button.main-btn { flex: 1; padding: 16px; border: none; border-radius: 14px; color: white; font-weight: 700; cursor: pointer; }
    .transaction-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(142,142,147,0.15); }
    .theme-btns { position: fixed; bottom: 25px; right: 25px; display: flex; flex-direction: column; gap: 12px; z-index: 1000; }
    .circle-btn { width: 50px; height: 50px; border-radius: 25px; background: rgba(44, 44, 46, 0.9); backdrop-filter: blur(10px); color: white; display: flex; align-items: center; justify-content: center; border: none; box-shadow: 0 8px 25px rgba(0,0,0,0.3); cursor: pointer; font-size: 22px; }
    .toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 12px 25px; border-radius: 30px; font-size: 14px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 2000; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="app-container" id="main-app">
    <header>
      <h1>Мои финансы</h1>
      <div class="period-selector">
        <button class="period-btn active" id="btn-all" onclick="app.setPeriod('all')">Все</button>
        <button class="period-btn" id="btn-month" onclick="app.setPeriod('month')">Месяц</button>
        <button class="period-btn" id="btn-week" onclick="app.setPeriod('week')">Неделя</button>
      </div>
    </header>

    <div class="balance-card">
      <h2>Баланс</h2>
      <div class="balance-amount" id="balance">0 ₽</div>
      <div class="inc-exp-row">
        <div class="stat-box stat-inc">Доходы<br><b id="inc-total">0 ₽</b></div>
        <div class="stat-box stat-exp">Расходы<br><b id="exp-total">0 ₽</b></div>
      </div>
    </div>

    <div class="analytics-card" id="chart-card" style="display: none;">
      <h2>Аналитика</h2>
      <div class="chart-container">
        <canvas id="mainChart"></canvas>
      </div>
    </div>

    <div class="add-transaction">
      <h2>Новая запись</h2>
      <input type="text" id="desc" placeholder="Описание">
      <input type="number" id="amt" placeholder="Сумма ₽" inputmode="decimal">
      <select id="cat">
        <option value="">Категория</option>
        <optgroup label="Доходы"><option value="salary">Зарплата</option><option value="other-inc">Прочее</option></optgroup>
        <optgroup label="Расходы"><option value="food">Продукты</option><option value="taxi">Транспорт</option><option value="cafe">Кафе</option><option value="other-exp">Другое</option></optgroup>
      </select>
      <div class="btn-group">
        <button class="main-btn" style="background:#34C759" onclick="app.add('income')">Доход</button>
        <button class="main-btn" style="background:#FF3B30" onclick="app.add('expense')">Расход</button>
      </div>
    </div>

    <div class="transactions">
      <h2>История</h2>
      <div id="list"></div>
    </div>
  </div>

  <div class="theme-btns" id="ui-buttons">
    <button class="circle-btn" onclick="app.changeBg()">🖼</button>
    <button class="circle-btn" onclick="app.toggleTheme()">🌙</button>
  </div>

  <div id="toast" class="toast"></div>

<script>
class FinanceApp {
  constructor() {
    this.tg = window.Telegram.WebApp;
    this.data = { 
      transactions: [], 
      isDark: false, 
      bg: 'https://i.pinimg.com/1200x/09/42/81/0942812567b8bd8717e0c458290d54f8.jpg' 
    };
    this.period = 'all';
    this.chart = null;

    this.init();
  }

  init() {
    this.tg.expand();
    this.tg.ready();
    this.sync();
    window.addEventListener('focus', () => this.sync());
  }

  async sync() {
    this.tg.CloudStorage.getItem('finance_data', (err, val) => {
      if (!err && val) {
        try { this.data = JSON.parse(val); } catch(e) {}
      } else {
        const local = localStorage.getItem('finance_data');
        if (local) try { this.data = JSON.parse(local); } catch(e) {}
      }
      this.applyTheme();
      this.render();
    });
  }

  async save() {
    const json = JSON.stringify(this.data);
    this.tg.CloudStorage.setItem('finance_data', json);
    localStorage.setItem('finance_data', json);
    this.render();
  }

  showToast(txt) {
    const el = document.getElementById('toast');
    if(el) {
      el.textContent = txt; el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2500);
    }
  }

  setPeriod(p) {
    this.period = p;
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('btn-' + p);
    if(btn) btn.classList.add('active');
    this.render();
  }

  add(type) {
    const d = document.getElementById('desc').value.trim();
    const a = parseFloat(document.getElementById('amt').value);
    const c = document.getElementById('cat').value;
    if (!d || isNaN(a) || a <= 0 || !c) return this.showToast('Ошибка данных');
    
    this.data.transactions.push({ 
      id: Date.now(), 
      type, 
      desc: d, 
      amt: a, 
      cat: c, 
      date: new Date().toISOString() 
    });
    
    this.save();
    document.getElementById('desc').value = ''; 
    document.getElementById('amt').value = '';
    this.showToast('Записано');
  }

  delete(id) {
    if(confirm('Удалить запись?')) {
      this.data.transactions = this.data.transactions.filter(t => t.id !== id);
      this.save();
    }
  }

  render() {
    const filtered = this.data.transactions.filter(t => {
      if (this.period === 'all') return true;
      const td = new Date(t.date);
      const diff = (new Date() - td) / 86400000;
      return this.period === 'week' ? diff <= 7 : diff <= 30;
    });

    let bal = 0, inc = 0, exp = 0;
    const cats = {};
    const listEl = document.getElementById('list');
    if(!listEl) return;
    listEl.innerHTML = '';

    filtered.sort((a,b) => b.id - a.id).forEach(t => {
      if (t.type === 'income') { inc += t.amt; bal += t.amt; }
      else { exp += t.amt; bal -= t.amt; cats[t.cat] = (cats[t.cat] || 0) + t.amt; }
      
      const item = document.createElement('div');
      item.className = 'transaction-item';
      item.innerHTML = `
        <div class="t-info">
          <div style="font-weight:600">${t.desc}</div>
          <div style="font-size:12px; opacity:0.5">${new Date(t.date).toLocaleDateString()}</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
          <b style="color:var(--${t.type}-color)">${t.type==='income'?'+':'-'}${t.amt} ₽</b>
          <button onclick="app.delete(${t.id})" style="border:none;background:none;font-size:18px;cursor:pointer">🗑</button>
        </div>
      `;
      listEl.appendChild(item);
    });

    document.getElementById('balance').textContent = bal.toLocaleString() + ' ₽';
    document.getElementById('inc-total').textContent = inc.toLocaleString() + ' ₽';
    document.getElementById('exp-total').textContent = exp.toLocaleString() + ' ₽';
    this.updateChart(cats);
  }

  updateChart(cats) {
    const keys = Object.keys(cats);
    const card = document.getElementById('chart-card');
    if(!card) return;
    if (!keys.length) { card.style.display='none'; return; }
    card.style.display='block';
    const ctxEl = document.getElementById('mainChart');
    if(!ctxEl) return;
    const ctx = ctxEl.getContext('2d');
    if (this.chart) this.chart.destroy();
    this.chart = new Chart(ctx, {
      type: 'doughnut',
      data: { 
        labels: keys.map(k=>this.getCatName(k)), 
        datasets: [{ 
          data: Object.values(cats), 
          backgroundColor: ['#FF3B30', '#FFCC00', '#007AFF', '#34C759', '#AF52DE', '#FF9500'], 
          borderWidth: 0 
        }] 
      },
      options: { 
        cutout: '75%', 
        plugins: { 
          legend: { position: 'bottom', labels: { color: this.data.isDark?'#fff':'#000', font: { size: 11 } } } 
        }, 
        maintainAspectRatio: false 
      }
    });
  }

  getCatName(c) {
    const m = { salary:'Зарплата', food:'Продукты', taxi:'Транспорт', cafe:'Кафе', other_inc:'Прочее', other_exp:'Другое' };
    return m[c] || 'Прочее';
  }

  toggleTheme() { this.data.isDark = !this.data.isDark; this.applyTheme(); this.save(); }
  
  applyTheme() {
    document.body.classList.toggle('dark-theme', this.data.isDark);
    document.body.style.backgroundImage = `url('${this.data.bg}')`;
  }

  changeBg() {
    const b = [
      'https://i.pinimg.com/1200x/09/42/81/0942812567b8bd8717e0c458290d54f8.jpg', 
      'https://i.pinimg.com/736x/76/f2/e1/76f2e1b76920a1540982ee3b67cd22a8.jpg',
      'https://images.unsplash.com/photo-1557683316-973673baf926?w=1200'
    ];
    let idx = b.indexOf(this.data.bg);
    this.data.bg = b[(idx + 1) % b.length];
    this.applyTheme(); 
    this.save();
  }
}
const app = new FinanceApp();
</script>
</body>
</html>
